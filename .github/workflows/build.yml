name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build -c release

      - name: Build .app bundle
        run: ./build.sh release

      - name: Sanity check bundle
        run: |
          test -f build/Wedge.app/Contents/MacOS/Wedge
          test -f build/Wedge.app/Contents/Info.plist
          codesign --verify --verbose=2 build/Wedge.app || true
